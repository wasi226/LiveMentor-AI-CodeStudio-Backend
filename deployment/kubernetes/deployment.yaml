# liveMentor AI CodeStudio Backend - Kubernetes Deployment
# Production-ready Kubernetes configuration with auto-scaling and health checks

apiVersion: apps/v1
kind: Deployment
metadata:
  name: livementor-backend
  namespace: livementor
  labels:
    app: livementor-backend
    version: v1.0.0
    tier: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: livementor-backend
  template:
    metadata:
      labels:
        app: livementor-backend
        version: v1.0.0
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: backend
        image: livementor/backend:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: BASE44_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: livementor-secrets
              key: base44-project-id
        - name: BASE44_API_KEY
          valueFrom:
            secretKeyRef:
              name: livementor-secrets
              key: base44-api-key
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: livementor-secrets
              key: jwt-secret
        - name: PISTON_API_URL
          valueFrom:
            configMapKeyRef:
              name: livementor-config
              key: piston-api-url
        - name: PISTON_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: livementor-secrets
              key: piston-api-token
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: livementor-secrets
              key: openai-api-key
        - name: REDIS_URL
          value: "redis://livementor-redis:6379"
        - name: CORS_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: livementor-config
              key: cors-origin
        - name: LOG_LEVEL
          value: "info"
        - name: ENABLE_CACHING
          value: "true"
        - name: ENABLE_WEBSOCKETS
          value: "true"
        - name: RATE_LIMIT_MAX_REQUESTS
          value: "2000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: uploads
          mountPath: /app/uploads
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
      volumes:
      - name: logs
        emptyDir: {}
      - name: uploads
        persistentVolumeClaim:
          claimName: livementor-uploads-pvc
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 1001

---
apiVersion: v1
kind: Service
metadata:
  name: livementor-backend-service
  namespace: livementor
  labels:
    app: livementor-backend
    tier: backend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: livementor-backend

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: livementor-backend-hpa
  namespace: livementor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: livementor-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 30

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: livementor-uploads-pvc
  namespace: livementor
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast-ssd

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: livementor-backend-ingress
  namespace: livementor
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - api.livementor.com
    secretName: livementor-backend-tls
  rules:
  - host: api.livementor.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: livementor-backend-service
            port:
              number: 80